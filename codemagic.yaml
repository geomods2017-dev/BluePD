workflows:
  ios-workflow:
    name: iOS Build

    environment:
      xcode: latest
      groups:
        - Default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bluepd.app

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Set build version
        script: |
          cd BluePD
          agvtool new-marketing-version 1.5
          agvtool new-version -all 10

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "BluePD/BluePD.xcodeproj" \
            --scheme "BluePD"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        private_key: $APP_STORE_CONNECT_PRIVATE_KEY
