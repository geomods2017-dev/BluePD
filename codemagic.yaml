workflows:
  ios-release:
    name: BluePD iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: BluePD

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bluepd.app
      vars:
        XCODE_SCHEME: "BluePD"
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install CocoaPods (if needed)
        script: |
          if [ -f "Podfile" ]; then
            pod install
          else
            echo "No Podfile found"
          fi

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          # Try workspace first, fallback to project
          if [ -d "$CM_BUILD_DIR/BluePD.xcworkspace" ]; then
            xcode-project build-ipa \
              --workspace "$CM_BUILD_DIR/BluePD.xcworkspace" \
              --scheme "$XCODE_SCHEME"
          else
            xcode-project build-ipa \
              --project "$CM_BUILD_DIR/BluePD.xcodeproj" \
              --scheme "$XCODE_SCHEME"
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - geomods2017@gmail.com
        notify:
          success: true
          failure: true
