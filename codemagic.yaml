workflows:
  ios-release:
    name: BluePD iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: BluePD

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bluepd.app
      vars:
        XCODE_SCHEME: "BluePD"
        BUNDLE_ID: "com.bluepd.app"
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install CocoaPods (if needed)
        script: |
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build signed IPA (force signing)
        script: |
          WORKSPACE=$(find . -name "BluePD.xcworkspace" | grep -v ".xcodeproj/" | head -1)
          PROJECT=$(find . -name "BluePD.xcodeproj" | head -1)

          echo "Workspace: $WORKSPACE"
          echo "Project: $PROJECT"

          if [ -n "$WORKSPACE" ]; then
            xcodebuild \
              -workspace "$WORKSPACE" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -archivePath build/BluePD.xcarchive \
              archive \
              DEVELOPMENT_TEAM="$CM_DEVELOPMENT_TEAM" \
              CODE_SIGN_STYLE=Automatic \
              -allowProvisioningUpdates

            xcodebuild -exportArchive \
              -archivePath build/BluePD.xcarchive \
              -exportOptionsPlist /Users/builder/export_options.plist \
              -exportPath build/ios/ipa
          else
            xcodebuild \
              -project "$PROJECT" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -archivePath build/BluePD.xcarchive \
              archive \
              DEVELOPMENT_TEAM="$CM_DEVELOPMENT_TEAM" \
              CODE_SIGN_STYLE=Automatic \
              -allowProvisioningUpdates

            xcodebuild -exportArchive \
              -archivePath build/BluePD.xcarchive \
              -exportOptionsPlist /Users/builder/export_options.plist \
              -exportPath build/ios/ipa
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - tylerclampitt@gmail.com
