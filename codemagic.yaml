workflows:
  ios-release:
    name: iOS Build
    environment:
      xcode: latest

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Set build version
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1" BluePD/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 2" BluePD/Info.plist

      - name: Create export options plist
        script: |
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          plutil -lint /Users/builder/export_options.plist

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "BluePD.xcodeproj" \
            --scheme "BluePD" \
            --export-options-plist "/Users/builder/export_options.plist"

    artifacts:
      - build/ios/ipa/*.ipa
