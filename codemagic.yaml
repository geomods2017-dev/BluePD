workflows:
  ios-release:
    name: BluePD iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: BluePD

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bluepd.app
      vars:
        XCODE_SCHEME: "BluePD"
        BUNDLE_ID: "com.bluepd.app"
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install CocoaPods (if needed)
        script: |
          if [ -f "Podfile" ]; then
            pod install
          else
            echo "No Podfile found, skipping pod install"
          fi

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          echo "Searching for correct Xcode workspace/project..."

          WORKSPACE=$(find . -name "BluePD.xcworkspace" | grep -v ".xcodeproj/" | head -1)
          PROJECT=$(find . -name "BluePD.xcodeproj" | head -1)

          echo "Workspace: $WORKSPACE"
          echo "Project: $PROJECT"

          if [ -n "$WORKSPACE" ]; then
            xcode-project build-ipa \
              --workspace "$WORKSPACE" \
              --scheme "$XCODE_SCHEME"
          elif [ -n "$PROJECT" ]; then
            xcode-project build-ipa \
              --project "$PROJECT" \
              --scheme "$XCODE_SCHEME"
          else
            echo "No valid BluePD.xcworkspace or BluePD.xcodeproj file found."
            exit 1
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - geomods2017@gmail.com
        notify:
          success: true
          failure: true
