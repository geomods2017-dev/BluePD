workflows:
  ios-workflow:
    name: iOS Build

    environment:
      xcode: latest
      groups:
        - Default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bluepd.app

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Verify Info.plist
        script: |
          /usr/libexec/PlistBuddy -c "Print" BluePD/BluePD/Info.plist

      - name: Auto increment build number
        script: |
          CURRENT=$(/usr/libexec/PlistBuddy -c "Print CFBundleVersion" BluePD/BluePD/Info.plist)
          if [ -z "$CURRENT" ]; then
            CURRENT=1
          fi
          NEW=$((CURRENT + 1))
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 2.1" BluePD/BluePD/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW" BluePD/BluePD/Info.plist
          echo "Using build number: $NEW"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "BluePD/BluePD.xcodeproj" \
            --scheme "BluePD"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
