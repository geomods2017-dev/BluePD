workflows:
  ios-workflow:
    name: Blue PD iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "BluePD/BluePD.xcodeproj"
        XCODE_SCHEME: "BluePD"

    scripts:
      - name: Build iOS app (no signing)
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
