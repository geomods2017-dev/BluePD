workflows:
  ios-workflow:
    name: iOS Build

    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bluepd.app

    scripts:
      - name: Set build version
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1" BluePD/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 2" BluePD/Info.plist

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "BluePD/BluePD.xcodeproj" \
            --scheme "BluePD"

    artifacts:
      - build/ios/ipa/*.ipa
