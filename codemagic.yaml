workflows:
  ios-workflow:
    name: iOS Build

    environment:
      xcode: latest

    scripts:
      - name: Set build version
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1" BluePD/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 2" BluePD/Info.plist

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "BluePD/BluePD.xcodeproj" \
            --scheme "BluePD"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        private_key: $APP_STORE_CONNECT_PRIVATE_KEY
