workflows:
  ios-workflow:
    name: iOS Build

    environment:
      xcode: latest
      groups:
        - Default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bluepd.app

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Verify Info.plist
        script: |
          /usr/libexec/PlistBuddy -c "Print" BluePD/Info.plist

      - name: Set build version (unique every build)
        script: |
          VERSION=2.$(date +%s)
          BUILD=$(date +%s)

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" BluePD/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" BluePD/Info.plist

          echo "VERSION=$VERSION"
          echo "BUILD=$BUILD"

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "BluePD/BluePD.xcodeproj" \
            --scheme "BluePD"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
