workflows:
  ios-workflow:
    name: Blue PD iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "BluePD/BluePD.xcodeproj"
        XCODE_SCHEME: "BluePD"
        APPLE_TEAM_ID: "TP65F453BM"
        BUNDLE_ID: "com.bluepd.app"

    scripts:
      - name: Build IPA for TestFlight
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
