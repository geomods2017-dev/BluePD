workflows:
  ios-release:
    name: BluePD iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: BluePD

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bluepd.app
      vars:
        XCODE_SCHEME: "BluePD"
        BUNDLE_ID: "com.bluepd.app"
      xcode: 26.2
      cocoapods: default

    scripts:
      - name: Install CocoaPods (if needed)
        script: |
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Force automatic signing in project file
        script: |
          PROJECT=$(find . -name "BluePD.xcodeproj" | head -1)

          echo "Fixing signing inside project..."

          # Force automatic signing everywhere
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' "$PROJECT/project.pbxproj"
          sed -i '' 's/ProvisioningStyle = Manual;/ProvisioningStyle = Automatic;/g' "$PROJECT/project.pbxproj"

          # Remove any hardcoded provisioning profile references
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = .*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' "$PROJECT/project.pbxproj"
          sed -i '' 's/PROVISIONING_PROFILE = .*;/PROVISIONING_PROFILE = "";/g' "$PROJECT/project.pbxproj"

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          WORKSPACE=$(find . -name "BluePD.xcworkspace" | grep -v ".xcodeproj/" | head -1)
          PROJECT=$(find . -name "BluePD.xcodeproj" | head -1)

          echo "Workspace: $WORKSPACE"
          echo "Project: $PROJECT"

          if [ -n "$WORKSPACE" ]; then
            xcode-project build-ipa \
              --workspace "$WORKSPACE" \
              --scheme "$XCODE_SCHEME" \
              --archive-flags="CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM=$CM_DEVELOPMENT_TEAM PRODUCT_BUNDLE_IDENTIFIER=$BUNDLE_ID"
          else
            xcode-project build-ipa \
              --project "$PROJECT" \
              --scheme "$XCODE_SCHEME" \
              --archive-flags="CODE_SIGN_STYLE=Automatic DEVELOPMENT_TEAM=$CM_DEVELOPMENT_TEAM PRODUCT_BUNDLE_IDENTIFIER=$BUNDLE_ID"
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - tylerclampitt@gmail.com
