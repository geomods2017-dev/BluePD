workflows:
  ios-release:
    name: iOS Build
    environment:
      xcode: latest

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      - name: Set build version
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1" BluePD/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 2" BluePD/Info.plist

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "BluePD.xcodeproj" \
            --scheme "BluePD"

    artifacts:
      - build/ios/ipa/*.ipa
