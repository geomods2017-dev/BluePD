workflows:
  ios-workflow:
    name: Blue PD iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      vars:
        XCODE_PROJECT: XCODE_PROJECT: "BluePD/BluePD/BluePD.xcodeproj"
        XCODE_SCHEME: "BluePD"
      xcode: latest

    scripts:
      - name: Build iOS app (no signing)
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO
