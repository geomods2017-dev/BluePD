workflows:
  ios-release:
    name: BluePD iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: BluePD

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bluepd.app
      vars:
        XCODE_SCHEME: "BluePD"
      xcode: latest
      cocoapods: default

    scripts:
      - name: Debug project structure
        script: |
          echo "Listing files..."
          find . -name "*.xcodeproj"
          find . -name "*.xcworkspace"
          find . -name "*.xcscheme"

      - name: Install CocoaPods (if needed)
        script: |
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Apply provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          WORKSPACE=$(find . -name "BluePD.xcworkspace" | grep -v ".xcodeproj/" | head -1)
          PROJECT=$(find . -name "BluePD.xcodeproj" | head -1)

          echo "Workspace: $WORKSPACE"
          echo "Project: $PROJECT"

          if [ -n "$WORKSPACE" ]; then
            xcode-project build-ipa \
              --workspace "$WORKSPACE" \
              --scheme "$XCODE_SCHEME"
          else
            xcode-project build-ipa \
              --project "$PROJECT" \
              --scheme "$XCODE_SCHEME"
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

      email:
        recipients:
          - tylerclampitt@gmail.com
